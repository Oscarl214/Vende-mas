<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #FFF7ED; color: #1F2937; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
  .card { background: #fff; border-radius: 16px; padding: 32px 24px; max-width: 420px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  h1 { font-size: 22px; color: #0F766E; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #6B7280; margin-bottom: 24px; }
  label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #374151; }
  input, textarea { width: 100%; padding: 12px 16px; border: 1.5px solid #E5E7EB; border-radius: 12px; font-size: 16px; font-family: inherit; margin-bottom: 16px; outline: none; transition: border-color 0.2s; background: #fff; }
  input:focus, textarea:focus { border-color: #0F766E; }
  textarea { resize: vertical; min-height: 80px; }
  .required::after { content: ' *'; color: #EF4444; }
  button { width: 100%; padding: 14px; background: #0F766E; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: #EF4444; font-size: 13px; margin-bottom: 12px; text-align: center; }
  .success-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
  .success-text { text-align: center; font-size: 16px; line-height: 1.5; }
  .powered { text-align: center; margin-top: 20px; font-size: 12px; color: #9CA3AF; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="card" id="formView">
  <h1 id="businessName">Business</h1>
  <p class="subtitle">Leave your contact info and we'll get back to you!</p>
  <p class="error hidden" id="errorMsg"></p>
  <form id="leadForm">
    <label class="required" for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Your name" required/>
    <label class="required" for="phone">Phone</label>
    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" required/>
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="you@email.com"/>
    <label for="message">Message</label>
    <textarea id="message" name="message" placeholder="How can we help you?"></textarea>
    <button type="submit" id="submitBtn">Send</button>
  </form>
  <p class="powered">Powered by VendeMás</p>
</div>

<div class="card hidden" id="successView">
  <div class="success-icon">&#10004;&#65039;</div>
  <h1 style="text-align:center" id="thankYouTitle">Thank you!</h1>
  <p class="success-text" style="margin-top:8px" id="thankYouMsg">We will contact you soon.</p>
  <p class="powered">Powered by VendeMás</p>
</div>

<div class="card hidden" id="closedView">
  <div class="success-icon">&#128274;</div>
  <h1 style="text-align:center" id="closedTitle">Form Unavailable</h1>
  <p class="success-text" style="margin-top:12px">This form is temporarily unavailable. Please contact the business directly.</p>
  <p class="powered">Powered by VendeMás</p>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var userId = params.get('user_id');
  var sourcePostId = params.get('source_post_id') || '';
  var business = params.get('business') || 'Business';

  var nameEl = document.getElementById('businessName');
  nameEl.textContent = decodeURIComponent(business);
  document.title = decodeURIComponent(business) + ' - Contact';

  if (!userId) {
    nameEl.textContent = 'Invalid Link';
    document.querySelector('.subtitle').textContent = 'This form link is not valid.';
    document.getElementById('leadForm').classList.add('hidden');
    return;
  }

  var apiBase = params.get('api') || window.location.origin;
  var fnUrl = apiBase + '/functions/v1/public-lead-form?user_id=' + userId;

  document.getElementById('leadForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = document.getElementById('submitBtn');
    var errorEl = document.getElementById('errorMsg');
    errorEl.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    var data = {
      user_id: userId,
      source_post_id: sourcePostId,
      name: document.getElementById('name').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      email: document.getElementById('email').value.trim(),
      message: document.getElementById('message').value.trim()
    };

    fetch(fnUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(function(res) { return res.json().then(function(d) { return { ok: res.ok, data: d }; }); })
    .then(function(result) {
      if (result.ok && result.data.success) {
        document.getElementById('formView').classList.add('hidden');
        document.getElementById('successView').classList.remove('hidden');
        var biz = decodeURIComponent(business);
        document.getElementById('thankYouMsg').textContent = biz + ' will contact you soon.';
      } else if (result.data.closed) {
        document.getElementById('formView').classList.add('hidden');
        document.getElementById('closedView').classList.remove('hidden');
      } else {
        errorEl.textContent = result.data.error || 'Something went wrong. Please try again.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Send';
      }
    })
    .catch(function() {
      errorEl.textContent = 'Something went wrong. Please try again.';
      errorEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Send';
    });
  });
})();
</script>

</body>
</html>
